const X_MIN = 1940;
const X_MAX = 2025;

let chart = null;
let activeIdx = 0;

function renderTabs() {
  const container = document.getElementById('tabs');
  CHARTS.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = c.tab;
    btn.onclick = () => switchChart(i);
    container.appendChild(btn);
  });
}

function switchChart(idx) {
  if (idx === activeIdx) return;
  const area = document.querySelector('.chart-area');
  area.classList.add('dissolving');
  setTimeout(() => {
    activeIdx = idx;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.className = 'tab' + (i === idx ? ' active' : '');
    });
    renderChart();
    setTimeout(() => {
      area.classList.remove('dissolving');
    }, 30);
  }, 350);
}

function renderChart() {
  const c = CHARTS[activeIdx];
  document.getElementById('chartTitle').textContent = c.title;
  document.getElementById('chartSubtitle').textContent = c.subtitle;
  document.getElementById('chartDesc').textContent = c.desc;
  document.getElementById('chartSource').textContent = 'Source: ' + c.source;

  const linksEl = document.getElementById('chartLinks');
  if (c.links && c.links.length > 0) {
    linksEl.innerHTML = c.links.map(l =>
      '<a href="' + l.url + '" target="_blank" rel="noopener">' + l.label + '</a>'
    ).join(' · ');
  } else {
    linksEl.innerHTML = '';
  }

  if (chart) chart.destroy();

  const ctx = document.getElementById('mainChart').getContext('2d');

  const datasets = c.datasets.map((ds, i) => ({
    ...ds,
    borderWidth: ds.borderWidth || 2.5,
    pointRadius: 3,
    pointBackgroundColor: ds.borderColor || ds.backgroundColor,
    tension: 0.3,
    fill: (c.fill && i === 0) ? true : (ds.fill || false),
  }));

  // Plugin to draw the ≈1978 reference line
  const refLinePlugin = {
    id: 'refLine',
    afterDraw(chartInstance) {
      const xScale = chartInstance.scales.x;
      const yScale = chartInstance.scales.y;
      if (!xScale || !yScale) return;

      const xPixel = xScale.getPixelForValue(1978);

      const ctx2 = chartInstance.ctx;
      ctx2.save();
      ctx2.beginPath();
      ctx2.setLineDash([6, 3]);
      ctx2.strokeStyle = COLORS.refLine;
      ctx2.lineWidth = 2;
      ctx2.moveTo(xPixel, yScale.top);
      ctx2.lineTo(xPixel, yScale.bottom);
      ctx2.stroke();

      ctx2.setLineDash([]);
      ctx2.fillStyle = COLORS.dark;
      ctx2.font = "italic 11px 'Libre Baskerville', Georgia, serif";
      ctx2.textAlign = 'center';
      ctx2.fillText('\u22481978', xPixel, yScale.top - 6);
      ctx2.restore();
    }
  };

  const scales = {
    x: {
      type: 'linear',
      min: X_MIN,
      max: X_MAX,
      ticks: {
        color: COLORS.tick,
        font: { size: 11, family: "'Libre Baskerville', Georgia, serif" },
        stepSize: 10,
        callback: function(v) { return v; }
      },
      grid: { color: COLORS.grid },
    },
    y: {
      min: c.yMin,
      max: c.yMax,
      ticks: {
        color: COLORS.tick,
        font: { size: 11, family: "'Libre Baskerville', Georgia, serif" },
        callback: function(v) {
          return (c.prefix || '') + (v < 1 && v > 0 ? v.toFixed(2) : (c.prefix === '$' ? (v/1000).toFixed(0) + 'k' : v)) + (c.suffix || '');
        }
      },
      grid: { color: COLORS.grid },
    },
  };

  if (c.dualAxis) {
    scales.y1 = {
      position: 'right',
      min: c.y1Min,
      max: c.y1Max,
      ticks: {
        color: COLORS.blue,
        font: { size: 11, family: "'Libre Baskerville', Georgia, serif" },
        callback: function(v) { return v + (c.suffix1 || ''); }
      },
      grid: { display: false },
    };
  }

  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'nearest', axis: 'x' },
      plugins: {
        legend: {
          display: c.datasets.length > 1,
          labels: {
            color: '#5a5a5a',
            font: { size: 12, family: "'Libre Baskerville', Georgia, serif" },
            padding: 16,
            usePointStyle: true,
          },
        },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,0.96)',
          titleColor: '#1a1a1a',
          bodyColor: '#3a3a3a',
          borderColor: '#d0cbc4',
          borderWidth: 1,
          titleFont: { family: "'Libre Baskerville', Georgia, serif", weight: 'bold' },
          bodyFont: { family: "'Libre Baskerville', Georgia, serif" },
          padding: 10,
          callbacks: {
            title: function(items) {
              if (items.length > 0) return String(Math.round(items[0].parsed.x));
              return '';
            },
            label: function(context) {
              let val = context.parsed.y;
              if (val < 1 && val > 0) val = val.toFixed(3);
              return context.dataset.label + ': ' + (c.prefix || '') + val + (c.suffix || '');
            }
          }
        },
      },
      scales,
    },
    plugins: [refLinePlugin],
  });
}

renderTabs();
renderChart();
</script>
